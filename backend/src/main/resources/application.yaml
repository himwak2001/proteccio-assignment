spring:
  application:
    name: datagov-dashboard

  datasource:
    url: jdbc:postgresql://localhost:5432/datagov
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # File upload limits
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cors:
    allowed-origins: http://localhost:5173

server:
  port: 8080